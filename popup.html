<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Shorts Auto Scroll</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="container">
      <h1>YouTube Shorts Auto Scroll</h1>

      <label class="toggle-row" for="enabledToggle">
        <span>Auto Scroll</span>
        <input id="enabledToggle" type="checkbox" />
      </label>

      <p class="hint">Tip: กด <strong>Alt + S</strong> เพื่อเปิด/ปิดแบบเร็วบนหน้า Shorts</p>
      <p id="statusText" class="status" aria-live="polite"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
